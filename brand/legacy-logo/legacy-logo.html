<!-- Original BugIt "bug-face" logo markup (backup — not loaded by the site). -->

<!-- Header + footer (mini): -->
<span class="bug-logo mini blink"><span class="eye left"></span><span class="eye right"></span><span class="mouth"></span><span class="antenna a1"></span><span class="antenna a2"></span></span>

<!-- Hero mission-control panel (big): -->
<span class="bug-logo big blink"><span class="eye left"></span><span class="eye right"></span><span class="mouth"></span><span class="antenna a1"></span><span class="antenna a2"></span></span>

<!-- Legacy CSS (already present in styles.css, kept for reference):
.bug-logo{position:relative;display:inline-block;border:3px solid white;border-radius:50%;background:radial-gradient(circle at 52% 54%,#2c2138 0,#09060e 72%);box-shadow:0 0 18px rgba(255,79,201,.2)}
.bug-logo.mini{width:52px;height:52px}.bug-logo.big{width:92px;height:92px}
.bug-logo .eye{position:absolute;top:38%;width:21%;height:21%;border-radius:50%;background:#fff;box-shadow:0 0 12px #fff;animation:blink 5.2s infinite}
.bug-logo .left{left:27%}.bug-logo .right{right:27%}
.bug-logo .mouth{position:absolute;left:40%;top:68%;width:20%;height:0;border-top:3px solid #f07af2;border-radius:999px}.bug-logo.big .mouth{border-top-width:4px}
.bug-logo .antenna{position:absolute;top:-30%;width:13%;height:38%;background:#ff54ca;border-radius:999px;transform-origin:bottom}
.bug-logo .a1{left:32%;transform:rotate(-13deg)}.bug-logo .a2{right:32%;transform:rotate(13deg)}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}94%,96%{transform:scaleY(.12)}}
-->
