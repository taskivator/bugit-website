name: CI

# Push-based CI (same-repo): a separate pull_request trigger would only duplicate
# runs on the same commit. Only skip files that are NOT part of the static build
# (build.js bundles the HTML/CSS/JS + public/, so those must still trigger CI).
on:
  push:
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'

# Cancel superseded in-progress runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Marketing site is static and dependency-free: prove it builds, its assets
# resolve, and the deployable output is produced.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Build static site
        run: node build.js
      - name: Verify referenced assets resolve
        run: node scripts/check-assets.mjs
      - name: Verify build output exists
        run: |
          test -f dist/index.html
          test -f dist/styles.css
          test -f dist/app.js
          test -d dist/public
          echo "Static build verified."
