name: CI

# Push-based CI (same-repo): a separate pull_request trigger would only duplicate
# runs on the same commit. Only skip files that are NOT part of the static build
# (build.js bundles the HTML/CSS/JS + public/, so those must still trigger CI).
on:
  push:
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'

# Cancel superseded in-progress runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Marketing site is static and dependency-free: prove it builds, its assets
# resolve, and the deployable output is produced.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Committed-secret scan (zero-dependency, deterministic). High-confidence
      # patterns + length anchors so nothing in this static site false-positives.
      - name: Secret scan
        run: |
          if git grep -nIE 'sk_live_[0-9a-zA-Z]{20}|sk-ant-api[0-9a-zA-Z_-]{20}|-----BEGIN [A-Z ]*PRIVATE KEY-----|sbp_[0-9a-f]{40}|re_[0-9a-zA-Z]{24}'; then
            echo "::error::Potential committed secret detected (see matches above)"; exit 1
          fi
          echo "No committed secrets detected."
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      # Build-time devDependency only (esbuild, for asset minification). The
      # shipped site stays dependency-free at runtime.
      - name: Install build tooling
        run: npm ci
      - name: Build static site
        run: node build.js
      - name: Verify referenced assets resolve
        run: node scripts/check-assets.mjs
      - name: Verify documentation links resolve
        run: node scripts/check-doc-links.mjs
      - name: Verify localized highlights and full PDF guides are complete
        run: node scripts/check-docs.mjs
      - name: Verify responsive pages do not overflow
        run: node scripts/check-overflow.mjs
      - name: Verify BugIt logo highlight is clipped (upper-corner artifact guard)
        run: node scripts/check-logo.mjs
      - name: Verify trust cards have no retired glyphs beside their SVG icons
        run: node scripts/check-trust-icons.mjs
      - name: Verify Google Ads tag shape (single load, consent-first, CSP hosts)
        run: node scripts/check-ads-tag.mjs
      - name: Verify immutable caching is confined to content-hashed filenames
        run: node scripts/check-cache-headers.mjs
      - name: Verify the CSP grants no unused or undisclosed telemetry destination
        run: node scripts/check-csp-telemetry.mjs
      - name: Verify billing copy states a one-time payment in every locale
        run: node scripts/check-billing-copy.mjs
      - name: Verify build output exists
        run: |
          # build.js content-hashes the bundle FILENAMES and deletes the unhashed
          # originals, so assert the hashed outputs exist — not the pre-hash names.
          test -f dist/index.html
          test -d dist/public
          ls dist/app.*.js       >/dev/null
          ls dist/styles.*.css   >/dev/null
          ls dist/consent.*.js   >/dev/null
          echo "Static build verified (hashed bundles present)."
