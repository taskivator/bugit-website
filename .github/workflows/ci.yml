name: CI

# Push-based CI (same-repo): a separate pull_request trigger would only duplicate
# runs on the same commit. Only skip files that are NOT part of the static build
# (build.js bundles the HTML/CSS/JS + public/, so those must still trigger CI).
on:
  push:
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'

# Cancel superseded in-progress runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Marketing site is static and dependency-free: prove it builds, its assets
# resolve, and the deployable output is produced.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Committed-secret scan (zero-dependency, deterministic). High-confidence
      # patterns + length anchors so nothing in this static site false-positives.
      - name: Secret scan
        run: |
          if git grep -nIE 'sk_live_[0-9a-zA-Z]{20}|sk-ant-api[0-9a-zA-Z_-]{20}|-----BEGIN [A-Z ]*PRIVATE KEY-----|sbp_[0-9a-f]{40}|re_[0-9a-zA-Z]{24}'; then
            echo "::error::Potential committed secret detected (see matches above)"; exit 1
          fi
          echo "No committed secrets detected."
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      # Build-time devDependency only (esbuild, for asset minification). The
      # shipped site stays dependency-free at runtime.
      - name: Install build tooling
        run: npm ci
      - name: Build static site
        run: node build.js
      - name: Verify referenced assets resolve
        run: node scripts/check-assets.mjs
      - name: Verify build output exists
        run: |
          test -f dist/index.html
          test -f dist/styles.css
          test -f dist/app.js
          test -d dist/public
          echo "Static build verified."
