name: CI

on: [push, pull_request]

# Marketing site is static and dependency-free: prove it builds, its assets
# resolve, and the deployable output is produced.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        run: node build.js
      - name: Verify referenced assets resolve
        run: node scripts/check-assets.mjs
      - name: Verify build output exists
        run: |
          test -f dist/index.html
          test -f dist/styles.css
          test -f dist/app.js
          test -d dist/public
          echo "Static build verified."
